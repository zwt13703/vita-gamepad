name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  PYTHON_VERSION: "3.12"
  VITASDK: /usr/local/vitasdk
  VITASDK_RELEASE: master-linux-v2.540
  VITASDK_ARCHIVE: vitasdk-x86_64-linux-gnu-2026-05-24_12-05-02.tar.bz2

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install project
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -v

  windows:
    name: Windows EXE
    needs: test
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build dashboard
        shell: powershell
        run: ./scripts/build_windows.ps1

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaGamepad-Windows
          path: dist/windows/VitaGamepadDashboard.exe
          if-no-files-found: error
          retention-days: 30

  vita:
    name: Vita VPK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes bzip2 cmake ninja-build xz-utils

      - name: Install VitaSDK
        run: |
          sdk_url="https://github.com/vitasdk/autobuilds/releases/download/${VITASDK_RELEASE}/${VITASDK_ARCHIVE}"
          curl --fail --location --retry 5 \
            --output "$RUNNER_TEMP/vitasdk.tar.bz2" "$sdk_url"
          sudo tar -xjf "$RUNNER_TEMP/vitasdk.tar.bz2" -C /usr/local
          echo "$VITASDK/bin" >> "$GITHUB_PATH"

      - name: Install Vita libraries
        run: |
          for package in zlib libpng libjpeg-turbo freetype libvita2d; do
            curl --fail --location --retry 5 \
              "https://github.com/vitasdk/packages/releases/download/master/${package}.tar.xz" \
              | sudo tar -xJ -C "$VITASDK/arm-vita-eabi"
          done

      - name: Build VPK
        run: |
          cmake -S vita -B vita/build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build vita/build --parallel

      - name: Upload Vita artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaGamepad-Vita
          path: vita/build/vita-gamepad.vpk
          if-no-files-found: error
          retention-days: 30

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - vita
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create checksums
        run: |
          cd release-assets
          sha256sum VitaGamepadDashboard.exe vita-gamepad.vpk > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/VitaGamepadDashboard.exe \
            release-assets/vita-gamepad.vpk \
            release-assets/SHA256SUMS.txt \
            --title "Vita Gamepad $GITHUB_REF_NAME" \
            --generate-notes
